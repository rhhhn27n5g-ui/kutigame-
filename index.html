<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuti Game</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* TAP FIX */
*{
    -webkit-tap-highlight-color: transparent;
}

#game{
    position:relative;
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    overflow:hidden;
}

#scene{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* CLICK ZONES */
#characterClick,
#gunClick,
#cabinetClick,
#stereoClick,
#lampClick{
    position:absolute;
    background:transparent;
    outline:none;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    -webkit-user-select:none;
}

#characterClick{
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:18%;
    height:30%;
    cursor:pointer;
}

#gunClick{
    right:8%;
    top:66%;
    width:8%;
    height:10%;
    cursor:pointer;
}

#cabinetClick{
    right:14%;
    top:78%;
    width:8%;
    height:10%;
    cursor:pointer;
}

#stereoClick{
    right:26%;
    top:44%;
    width:9%;
    height:12%;
    cursor:pointer;
}

#lampClick{
    left:13%;
    top:16%;
    width:9%;
    height:16%;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="game">
    <img id="scene" src="./idle.png">

    <div id="characterClick"></div>
    <div id="gunClick"></div>
    <div id="cabinetClick"></div>
    <div id="stereoClick"></div>
    <div id="lampClick"></div>
</div>

<script>

let clickStage = 0;
let stereoStage = 0;
let animationPlaying = false;

/* FRAME GENERATOR */
function makeFrames(folder, start, end){
    let frames = [];
    for(let i = start; i <= end; i++){
        let num = String(i).padStart(3, "0");
        frames.push(`./${folder}/frame_${num}.png`);
    }
    return frames;
}

/* ANIMATIONS */
const animations = [
    makeFrames("phone_call", 1, 12),
    makeFrames("punch", 13, 17),
    makeFrames("phone_text", 18, 29)
];

const gunAnimation = makeFrames("gun reload", 30, 33);
const cabinetAnimation = makeFrames("cabinet", 34, 43);
const stereoAnimation = makeFrames("stereo", 44, 56);
const lampAnimation = makeFrames("lamp", 57, 68);

/* =========================
   ✅ SOUND PRELOAD SYSTEM
========================= */

const soundFiles = [
    "call.mp3",
    "punch.mp3",
    "text.mp3",
    "gun.mp3",
    "cabinet.mp3",
    "lamp.mp3",
    "stereo_1.mp3",
    "stereo_2.mp3",
    "stereo_3.mp3"
];

const sounds = {};

soundFiles.forEach(file => {
    const audio = new Audio(`./sounds/${file}`);
    audio.preload = "auto";
    audio.load();
    sounds[file] = audio;
});

/* PLAY SOUND */
function playSound(file){
    const sound = sounds[file];
    if(!sound) return;

    sound.currentTime = 0;
    sound.play();
}

/* PRELOAD IMAGES */
const allFrames = [
    ...animations.flat(),
    ...gunAnimation,
    ...cabinetAnimation,
    ...stereoAnimation,
    ...lampAnimation,
    "./idle.png"
];

allFrames.forEach(src => {
    const img = new Image();
    img.src = src;
});

/* ANIMATION FUNCTION */
function playAnimation(frames){
    animationPlaying = true;

    let scene = document.getElementById("scene");
    let i = 0;

    clearInterval(window.animLoop);

    scene.src = frames[0];

    window.animLoop = setInterval(() => {
        i++;

        if(i >= frames.length){
            clearInterval(window.animLoop);
            scene.src = "./idle.png";
            animationPlaying = false;
            return;
        }

        scene.src = frames[i];
    }, 100);
}

/* CLICK EVENTS */

/* CHARACTER (cycle sounds) */
document.getElementById("characterClick").addEventListener("click", () => {
    if(animationPlaying) return;

    playAnimation(animations[clickStage]);

    if(clickStage === 0) playSound("call.mp3");
    if(clickStage === 1) playSound("punch.mp3");
    if(clickStage === 2) playSound("text.mp3");

    clickStage++;
    if(clickStage >= animations.length) clickStage = 0;
});

/* GUN */
document.getElementById("gunClick").addEventListener("click", () => {
    if(animationPlaying) return;
    playAnimation(gunAnimation);
    playSound("gun.mp3");
});

/* CABINET */
document.getElementById("cabinetClick").addEventListener("click", () => {
    if(animationPlaying) return;
    playAnimation(cabinetAnimation);
    playSound("cabinet.mp3");
});

/* STEREO (cycle sounds) */
document.getElementById("stereoClick").addEventListener("click", () => {
    if(animationPlaying) return;

    playAnimation(stereoAnimation);

    if(stereoStage === 0) playSound("stereo_1.mp3");
    if(stereoStage === 1) playSound("stereo_2.mp3");
    if(stereoStage === 2) playSound("stereo_3.mp3");

    stereoStage++;
    if(stereoStage >= 3) stereoStage = 0;
});

/* LAMP */
document.getElementById("lampClick").addEventListener("click", () => {
    if(animationPlaying) return;
    playAnimation(lampAnimation);
    playSound("lamp.mp3");
});

</script>

</body>
</html>
