<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuti Game</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main image */
#scene{
    width:100%;
    height:100%;
    object-fit:contain; /* shows whole game */
}

/* Character */
#characterClick{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:18%;
    height:30%;
    cursor:pointer;
}

/* Gun */
#gunClick{
    position:absolute;
    right:2%;
    top:66%;
    width:8%;
    height:10%;
    cursor:pointer;
}

/* Cabinet */
#cabinetClick{
    position:absolute;
    right:8%;
    top:78%;
    width:8%;
    height:10%;
    cursor:pointer;
}

/* Stereo */
#stereoClick{
    position:absolute;
    right:20%;
    top:44%;
    width:9%;
    height:12%;
    cursor:pointer;
}

/* Lamp */
#lampClick{
    position:absolute;
    left:4%;
    top:16%;
    width:9%;
    height:16%;
    cursor:pointer;
}

/* Phone adjustments */
@media (max-width:768px){

    #characterClick{
        width:22%;
        height:35%;
    }

    #gunClick{
        width:10%;
        height:12%;
    }

    #cabinetClick{
        width:10%;
        height:12%;
    }

    #stereoClick{
        width:12%;
        height:14%;
    }

    #lampClick{
        width:11%;
        height:18%;
    }

}
</style>
</head>

<body>

<div id="game">
    <img id="scene" src="./idle.png">

    <div id="characterClick"></div>
    <div id="gunClick"></div>
    <div id="cabinetClick"></div>
    <div id="stereoClick"></div>
    <div id="lampClick"></div>
</div>

<script>

let clickStage = 0;
let animationPlaying = false;

function makeFrames(folder, start, end){

let frames = [];

for(let i = start; i <= end; i++){

let num = String(i).padStart(3, "0");

frames.push(`./${folder}/frame_${num}.png`);

}

return frames;
}

const animations = [
    makeFrames("phone_call", 1, 12),
    makeFrames("punch", 13, 17),
    makeFrames("phone_text", 18, 29)
];

const gunAnimation = makeFrames("gun reload", 30, 33);
const cabinetAnimation = makeFrames("cabinet", 34, 43);
const stereoAnimation = makeFrames("stereo", 44, 56);
const lampAnimation = makeFrames("lamp", 57, 68);

// Character click
document.getElementById("characterClick").addEventListener("click", () => {

if(animationPlaying) return;

playAnimation(animations[clickStage]);

clickStage++;

if(clickStage >= animations.length){
clickStage = 0;
}

});

// Gun click
document.getElementById("gunClick").addEventListener("click", () => {

if(animationPlaying) return;

playAnimation(gunAnimation);

});

// Cabinet click
document.getElementById("cabinetClick").addEventListener("click", () => {

if(animationPlaying) return;

playAnimation(cabinetAnimation);

});

// Stereo click
document.getElementById("stereoClick").addEventListener("click", () => {

if(animationPlaying) return;

playAnimation(stereoAnimation);

});

// Lamp click
document.getElementById("lampClick").addEventListener("click", () => {

if(animationPlaying) return;

playAnimation(lampAnimation);

});

function playAnimation(frames){

animationPlaying = true;

let scene = document.getElementById("scene");

let i = 0;

clearInterval(window.animLoop);

scene.src = frames[0];

window.animLoop = setInterval(() => {

i++;

if(i >= frames.length){

clearInterval(window.animLoop);

scene.src = "./idle.png";

animationPlaying = false;

return;

}

scene.src = frames[i];

},100);

}

</script>

</body>
</html>
